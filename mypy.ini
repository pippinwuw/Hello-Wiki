# Backend type-check config when invoked from the monorepo root, e.g.:
#   mypy apps/backend/src
# CI and the canonical command (uses apps/backend/pyproject.toml overrides):
#   cd apps/backend && mypy src

[mypy]
python_version = 3.11
strict = True
ignore_missing_imports = True
disable_error_code = import-untyped
plugins = pydantic.mypy

[mypy-src.*]
# apps/backend layout: modules are imported as src.* with PYTHONPATH=apps/backend
