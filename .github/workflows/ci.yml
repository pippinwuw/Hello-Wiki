name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.19.0"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Agent AI Package Check
        run: pnpm check:agent-ai

  backend-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          cd apps/backend
          pip install -e ".[dev]"

      - name: Import Architecture Check (import-linter)
        run: |
          cd apps/backend
          lint-imports

      - name: Type Check (mypy)
        run: |
          cd apps/backend
          mypy src/

      - name: Lint (ruff)
        run: |
          cd apps/backend
          ruff check src/ tests/

      - name: Format Check (ruff)
        run: |
          cd apps/backend
          ruff format --check src/ tests/

      - name: Run Tests
        run: |
          cd apps/backend
          python3 -m pytest tests/ -q --tb=short
