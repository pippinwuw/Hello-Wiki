# Development database services for Hello-Wiki
# Start: docker compose -f deploy/dev/docker-compose.yml up -d --build
# Stop:  docker compose -f deploy/dev/docker-compose.yml down

services:
  postgres:
    build: .
    container_name: hwiki-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vibe_coding
      POSTGRES_DB: zhiyuan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-extensions.sql:/docker-entrypoint-initdb.d/01-init-extensions.sql:ro
      - ../../src/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zhiyuan"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hwiki-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
