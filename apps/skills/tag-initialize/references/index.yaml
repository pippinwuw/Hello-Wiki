# Tag Generation — Domain Reference Registry

references:
  - id: general
    name: General-Purpose Tag Taxonomy
    description: Default tag generation for mixed-content knowledge bases. Produces a balanced set of category dimensions (document_type, topic, audience, time_sensitivity).
